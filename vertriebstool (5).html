<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertriebstool – CRM+</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F2EE;
  --surface: #FAFAF8;
  --surface2: #EEECEA;
  --border: #DDDAD5;
  --border2: #C9C6C0;
  --text: #1A1916;
  --text2: #6B6860;
  --text3: #9B9890;
  --accent: #2D5A27;
  --accent-light: #EBF2EA;
  --accent-text: #1E3D1A;
  --warn: #8B5E00;
  --warn-light: #FFF4DC;
  --danger: #8B1F1F;
  --danger-light: #FDEAEA;
  --info: #1A3A6B;
  --info-light: #E8EFFE;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ── LOGIN ─────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2.5rem;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow-md);
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2rem;
}

.login-logo-mark {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}

.login-logo-mark svg { fill: white; }

.login-title { font-size: 20px; font-weight: 600; color: var(--text); }
.login-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.02em; text-transform: uppercase; }
.field input {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--text);
  background: var(--bg);
  outline: none; transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent); }

.btn {
  width: 100%; padding: 10px 16px;
  background: var(--accent); color: white;
  border: none; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
  margin-top: 4px;
}
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.msg-error {
  margin-top: 12px; padding: 10px 12px;
  background: var(--danger-light); color: var(--danger);
  border: 1px solid #F5C6C6; border-radius: var(--radius-sm);
  font-size: 13px;
}
.msg-ok {
  margin-top: 12px; padding: 10px 12px;
  background: var(--accent-light); color: var(--accent-text);
  border: 1px solid #C0D9BC; border-radius: var(--radius-sm);
  font-size: 13px;
}

/* ── APP SHELL ──────────────────────────────────────── */
#app-screen { display: none; min-height: 100vh; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}

.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.topbar-logo svg { fill: white; }
.topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
.topbar-user { font-size: 13px; color: var(--text2); }

.logout-btn {
  font-size: 12px; padding: 5px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: transparent; color: var(--text2);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}
.logout-btn:hover { background: var(--surface2); }

.main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

/* ── STATS ──────────────────────────────────────────── */
.stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
.stat-value.warn { color: var(--warn); }
.stat-value.danger { color: var(--danger); }
.stat-value.accent { color: var(--accent); }

/* ── TABS ───────────────────────────────────────────── */
.tabs {
  display: flex; gap: 2px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 3px;
  width: fit-content;
  margin-bottom: 1.25rem;
}
.tab {
  padding: 6px 16px;
  font-size: 13px; font-weight: 500;
  border-radius: 5px; border: none;
  background: transparent; color: var(--text2);
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

/* ── PIPELINE ───────────────────────────────────────── */
.pipeline {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 10px;
  align-items: start;
}

.phase-col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  min-height: 200px;
}

.phase-header {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 10px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.phase-name { font-size: 12px; font-weight: 600; color: var(--text); }
.phase-count {
  margin-left: auto;
  font-size: 11px; font-family: 'DM Mono', monospace;
  background: var(--surface2); color: var(--text2);
  padding: 2px 7px; border-radius: 20px;
}

.contact-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 10px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.contact-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,90,39,0.07); }
.contact-card:last-child { margin-bottom: 0; }
.card-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.card-id { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.card-badge {
  display: inline-block; margin-top: 5px;
  font-size: 11px; font-weight: 500;
  padding: 2px 7px; border-radius: 20px;
}
.badge-warn { background: var(--warn-light); color: var(--warn); }
.badge-danger { background: var(--danger-light); color: var(--danger); }
.badge-ok { background: var(--accent-light); color: var(--accent-text); }
.badge-info { background: var(--info-light); color: var(--info); }

.empty-col { font-size: 12px; color: var(--text3); text-align: center; padding: 1.5rem 0; }

/* ── WIEDERVORLAGE ──────────────────────────────────── */
.wv-list { display: flex; flex-direction: column; gap: 8px; }

.wv-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 16px;
  display: flex; align-items: center; gap: 14px;
}
.wv-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px;
}
.wv-icon.danger { background: var(--danger-light); }
.wv-icon.warn { background: var(--warn-light); }
.wv-info { flex: 1; min-width: 0; }
.wv-name { font-size: 14px; font-weight: 500; color: var(--text); }
.wv-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.wv-actions { display: flex; gap: 6px; flex-shrink: 0; }
.action-btn {
  font-size: 12px; font-weight: 500; padding: 6px 14px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.action-btn.outline {
  border: 1px solid var(--border); background: transparent; color: var(--text2);
}
.action-btn.outline:hover { background: var(--surface2); border-color: var(--border2); }
.action-btn.solid {
  border: 1px solid var(--accent); background: var(--accent); color: white;
}
.action-btn.solid:hover { opacity: 0.88; }

/* ── ALLE KONTAKTE ──────────────────────────────────── */
.contact-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.ct-header {
  display: grid; grid-template-columns: 1fr 140px 130px 100px;
  padding: 10px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.ct-row {
  display: grid; grid-template-columns: 1fr 140px 130px 100px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  transition: background 0.1s; cursor: pointer;
}
.ct-row:last-child { border-bottom: none; }
.ct-row:hover { background: var(--surface2); }
.ct-name { font-size: 13px; font-weight: 500; color: var(--text); }
.ct-phase { font-size: 12px; color: var(--text2); }
.ct-id { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); }

/* ── LOADING / SECTION ──────────────────────────────── */
.loading { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
.loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-left: 10px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.section-title { font-size: 15px; font-weight: 600; color: var(--text); }

.refresh-btn {
  font-size: 12px; padding: 5px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: transparent; color: var(--text2); cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.refresh-btn:hover { background: var(--surface2); }

/* ── DETAIL MODAL ───────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.35); z-index: 200;
  align-items: center; justify-content: center; padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.75rem;
  width: 100%; max-width: 500px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: var(--shadow-md);
}
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; color: var(--text); }
.modal-field { margin-bottom: 10px; display: flex; gap: 8px; }
.modal-key { font-size: 12px; color: var(--text3); width: 130px; flex-shrink: 0; padding-top: 1px; }
.modal-val { font-size: 13px; color: var(--text); word-break: break-all; }
.modal-close {
  float: right; background: transparent; border: none;
  font-size: 20px; color: var(--text3); cursor: pointer; line-height: 1;
}
.modal-close:hover { color: var(--text); }

/* Phase selector in modal */
.phase-select {
  width: 100%; padding: 7px 10px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  background: var(--bg); color: var(--text);
  margin-top: 12px;
}
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-btn {
  flex: 1; padding: 8px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif; border: 1px solid var(--border);
  background: transparent; color: var(--text2); transition: all 0.15s;
}
.modal-btn:hover { background: var(--surface2); }
.modal-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.modal-btn.primary:hover { opacity: 0.88; }

.no-data { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 1L16 5V13L9 17L2 13V5L9 1Z"/></svg>
      </div>
      <div>
        <div class="login-title">Vertriebstool</div>
        <div class="login-sub">Verbunden mit CRM+ von Brainformatik</div>
      </div>
    </div>
    <div class="field">
      <label>CRM+ URL</label>
      <input type="text" id="url" value="https://ohmxx.brain-app.com" />
    </div>
    <div class="field">
      <label>Benutzername</label>
      <input type="text" id="username" value="thokue" />
    </div>
    <div class="field">
      <label>Passwort</label>
      <input type="password" id="password" value="nqRGmh896CNw" />
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Einloggen & Verbinden</button>
    <div id="login-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg width="14" height="14" viewBox="0 0 18 18"><path d="M9 1L16 5V13L9 17L2 13V5L9 1Z"/></svg>
      </div>
      <span class="topbar-title">Vertriebstool</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="logout-btn" onclick="doLogout()">Abmelden</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="stat-label">Kontakte gesamt</div><div class="stat-value" id="s-total">–</div></div>
      <div class="stat"><div class="stat-label">Wiedervorlage heute</div><div class="stat-value warn" id="s-heute">–</div></div>
      <div class="stat"><div class="stat-label">Überfällig</div><div class="stat-value danger" id="s-offen">–</div></div>
      <div class="stat"><div class="stat-label">Abschlüsse</div><div class="stat-value accent" id="s-abschluss">–</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('pipeline',this)">Pipeline</button>
      <button class="tab" onclick="switchTab('wiedervorlage',this)">Wiedervorlage</button>
      <button class="tab" onclick="switchTab('alle',this)">Alle Kontakte</button>
    </div>

    <!-- Pipeline -->
    <div id="tab-pipeline">
      <div id="pipeline-loading" class="loading">Lade Daten aus CRM+</div>
      <div id="pipeline-board" class="pipeline" style="display:none"></div>
    </div>

    <!-- Wiedervorlage -->
    <div id="tab-wiedervorlage" style="display:none">
      <div class="section-head">
        <span class="section-title">Fällige Wiedervorlagen</span>
        <button class="refresh-btn" onclick="loadData()">↻ Aktualisieren</button>
      </div>
      <div class="wv-list" id="wv-list"></div>
    </div>

    <!-- Alle -->
    <div id="tab-alle" style="display:none">
      <div class="section-head">
        <span class="section-title">Alle Kontakte</span>
        <button class="refresh-btn" onclick="loadData()">↻ Aktualisieren</button>
      </div>
      <div class="contact-table" id="alle-table">
        <div class="ct-header"><div>Name</div><div>Phase</div><div>Wiedervorlage</div><div>ID</div></div>
        <div id="alle-rows"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-inner">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modal-title">Kontakt</div>
    <div id="modal-fields"></div>
    <select class="phase-select" id="modal-phase">
      <option value="">– Phase auswählen –</option>
      <option value="erstkontakt">Erstkontakt</option>
      <option value="bedarfsanalyse">Bedarfsanalyse</option>
      <option value="angebot">Angebot</option>
      <option value="verhandlung">Verhandlung</option>
      <option value="abschluss">Abschluss</option>
    </select>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal()">Schließen</button>
      <button class="modal-btn primary" onclick="savePhase()">Phase speichern</button>
    </div>
  </div>
</div>

<script>
const PHASES = [
  { id: 'erstkontakt',   label: 'Erstkontakt',   color: '#9B9890' },
  { id: 'bedarfsanalyse',label: 'Bedarfsanalyse',color: '#378ADD' },
  { id: 'angebot',       label: 'Angebot',       color: '#EF9F27' },
  { id: 'verhandlung',   label: 'Verhandlung',   color: '#E24B4A' },
  { id: 'abschluss',     label: 'Abschluss',     color: '#2D5A27' }
];

const PHASE_LABELS = {
  erstkontakt:'Erstkontakt', bedarfsanalyse:'Bedarfsanalyse',
  angebot:'Angebot', verhandlung:'Verhandlung', abschluss:'Abschluss'
};

let G = { token: null, url: '', user: '', contacts: [], entityId: null, selectedContact: null };

// ── AUTH ─────────────────────────────────────────────
async function doLogin() {
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('login-msg');
  G.url   = document.getElementById('url').value.replace(/\/+$/, '');
  G.user  = document.getElementById('username').value.trim();
  const pw = document.getElementById('password').value;
  btn.disabled = true; btn.textContent = 'Verbinde…'; msg.innerHTML = '';
  try {
    const r = await fetch(G.url + '/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/vnd.brainformatik.crm-v1+json' },
      body: JSON.stringify({ user: G.user, password: pw, apiPassword: 'xkQC5ALmnlpMkk1U' })
    });
    const d = await r.json();
    if (d?.data?.accessToken) {
      G.token = d.data.accessToken;
      msg.innerHTML = '<div class="msg-ok">✓ Verbindung erfolgreich!</div>';
      setTimeout(showApp, 700);
    } else {
      msg.innerHTML = '<div class="msg-error">Fehler: ' + (d?.message || 'Zugangsdaten prüfen') + '</div>';
      btn.disabled = false; btn.textContent = 'Einloggen & Verbinden';
    }
  } catch(e) {
    msg.innerHTML = '<div class="msg-error">Verbindungsfehler: ' + e.message + '</div>';
    btn.disabled = false; btn.textContent = 'Einloggen & Verbinden';
  }
}

function doLogout() {
  G = { token:null, url:'', user:'', contacts:[], entityId:null, selectedContact:null };
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Einloggen & Verbinden';
  document.getElementById('login-msg').innerHTML = '';
}

// ── LOAD DATA ────────────────────────────────────────
async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('topbar-user').textContent = G.user;
  await loadData();
}

async function loadData() {
  document.getElementById('pipeline-loading').style.display = 'block';
  document.getElementById('pipeline-board').style.display = 'none';
  try {
    // Get metadata to find the right entity
    if (!G.entityId) {
      const mr = await apiFetch('/api/metadata');
      const entities = mr?.data || [];
      const found = entities.find(e => {
        const n = (e.name || e.label || '').toLowerCase();
        return n.includes('account') || n.includes('organisation') || n.includes('kontakt') || n.includes('contact') || n.includes('lead');
      }) || entities[0];
      G.entityId = found?.id || 1;
    }
    // Load records
    const rr = await apiFetch('/api/entity/' + G.entityId + '/records?limit=100');
    const raw = rr?.data || [];
    G.contacts = Array.isArray(raw) ? raw : [raw];
    renderAll();
  } catch(e) {
    document.getElementById('pipeline-loading').textContent = 'Fehler: ' + e.message;
  }
}

async function apiFetch(path, opts = {}) {
  const r = await fetch(G.url + path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + G.token,
      'Content-Type': 'application/vnd.brainformatik.crm-v1+json',
      ...(opts.headers || {})
    }
  });
  return r.json();
}

// ── HELPERS ──────────────────────────────────────────
function getName(c) {
  for (const k of ['name','label','displayName','title','firstName','vorname','fullName','company','firma']) {
    if (c[k] && typeof c[k] === 'string') return c[k];
  }
  // Try first+last
  const first = c.firstName || c.vorname || '';
  const last  = c.lastName  || c.nachname || '';
  if (first || last) return (first + ' ' + last).trim();
  return 'Kontakt #' + (c.id || '?');
}

function getPhase(c) {
  const s = JSON.stringify(c).toLowerCase();
  if (s.includes('abschluss') || s.includes('gewonnen') || s.includes('won')) return 'abschluss';
  if (s.includes('verhandlung') || s.includes('negot'))  return 'verhandlung';
  if (s.includes('angebot') || s.includes('offer') || s.includes('proposal')) return 'angebot';
  if (s.includes('bedarfsanalyse') || s.includes('bedarf') || s.includes('qualify')) return 'bedarfsanalyse';
  return 'erstkontakt';
}

function getWV(c) {
  const today = todayStr();
  const allDates = JSON.stringify(c).match(/\d{4}-\d{2}-\d{2}/g) || [];
  const future = allDates.filter(d => d >= today && d <= '2099-12-31');
  const past   = allDates.filter(d => d <  today && d >= '2020-01-01');
  if (future.length) {
    const d = future.sort()[0];
    if (d === today) return { date:d, label:'Heute', cls:'warn' };
    return { date:d, label:d, cls:'ok' };
  }
  if (past.length) {
    const d = past.sort().reverse()[0];
    return { date:d, label:'Überfällig', cls:'danger' };
  }
  return null;
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

// ── RENDER ────────────────────────────────────────────
function renderAll() {
  const cs = G.contacts;
  const today = todayStr();
  let heute=0, offen=0, abschluss=0;
  cs.forEach(c => {
    const wv = getWV(c);
    if (wv?.date === today) heute++;
    if (wv?.cls === 'danger') offen++;
    if (getPhase(c) === 'abschluss') abschluss++;
  });
  document.getElementById('s-total').textContent    = cs.length;
  document.getElementById('s-heute').textContent    = heute;
  document.getElementById('s-offen').textContent    = offen;
  document.getElementById('s-abschluss').textContent = abschluss;

  renderPipeline(cs);
  renderWV(cs);
  renderAlle(cs);
}

function renderPipeline(cs) {
  const board = document.getElementById('pipeline-board');
  board.innerHTML = '';
  PHASES.forEach(ph => {
    const group = cs.filter(c => getPhase(c) === ph.id);
    const col = document.createElement('div');
    col.className = 'phase-col';
    col.innerHTML = `<div class="phase-header">
      <span class="phase-dot" style="background:${ph.color}"></span>
      <span class="phase-name">${ph.label}</span>
      <span class="phase-count">${group.length}</span>
    </div>`;
    if (group.length === 0) {
      col.innerHTML += '<div class="empty-col">Keine Einträge</div>';
    } else {
      group.forEach(c => {
        const wv = getWV(c);
        const card = document.createElement('div');
        card.className = 'contact-card';
        card.innerHTML = `<div class="card-name">${getName(c)}</div>
          <div class="card-id">ID ${c.id || '–'}</div>
          ${wv ? `<span class="card-badge badge-${wv.cls}">${wv.label}</span>` : ''}`;
        card.onclick = () => openModal(c);
        col.appendChild(card);
      });
    }
    board.appendChild(col);
  });
  document.getElementById('pipeline-loading').style.display = 'none';
  board.style.display = 'grid';
}

function renderWV(cs) {
  const list = document.getElementById('wv-list');
  list.innerHTML = '';
  const today = todayStr();
  const fällig = cs.filter(c => {
    const wv = getWV(c);
    return wv && (wv.cls === 'danger' || wv.date === today);
  }).sort((a,b) => {
    const wa = getWV(a), wb = getWV(b);
    return wa.date.localeCompare(wb.date);
  });

  if (fällig.length === 0) {
    list.innerHTML = '<div class="no-data">✓ Keine fälligen Wiedervorlagen</div>';
    return;
  }
  fällig.forEach(c => {
    const wv = getWV(c);
    const item = document.createElement('div');
    item.className = 'wv-item';
    const icon = wv.cls === 'danger' ? '⚠' : '📅';
    item.innerHTML = `
      <div class="wv-icon ${wv.cls}">${icon}</div>
      <div class="wv-info">
        <div class="wv-name">${getName(c)}</div>
        <div class="wv-sub">${PHASE_LABELS[getPhase(c)]} · ${wv.label}</div>
      </div>
      <div class="wv-actions">
        <button class="action-btn outline" onclick="openModal(window._c${c.id})">Details</button>
        <button class="action-btn solid" onclick="openModal(window._c${c.id})">Kontaktieren</button>
      </div>`;
    window['_c' + c.id] = c;
    list.appendChild(item);
  });
}

function renderAlle(cs) {
  const rows = document.getElementById('alle-rows');
  rows.innerHTML = '';
  if (cs.length === 0) { rows.innerHTML = '<div class="no-data">Keine Kontakte</div>'; return; }
  cs.forEach(c => {
    const wv = getWV(c);
    const row = document.createElement('div');
    row.className = 'ct-row';
    row.innerHTML = `
      <div class="ct-name">${getName(c)}</div>
      <div class="ct-phase">${PHASE_LABELS[getPhase(c)]}</div>
      <div>${wv ? `<span class="card-badge badge-${wv.cls}">${wv.label}</span>` : '<span style="color:var(--text3);font-size:12px">–</span>'}</div>
      <div class="ct-id">#${c.id || '–'}</div>`;
    row.onclick = () => openModal(c);
    rows.appendChild(row);
  });
}

// ── MODAL ────────────────────────────────────────────
function openModal(c) {
  G.selectedContact = c;
  document.getElementById('modal-title').textContent = getName(c);
  document.getElementById('modal-phase').value = getPhase(c);
  const fields = document.getElementById('modal-fields');
  fields.innerHTML = '';
  const skip = ['id'];
  Object.entries(c).forEach(([k, v]) => {
    if (skip.includes(k) || v === null || v === undefined || v === '') return;
    if (typeof v === 'object') return;
    const row = document.createElement('div');
    row.className = 'modal-field';
    row.innerHTML = `<div class="modal-key">${k}</div><div class="modal-val">${v}</div>`;
    fields.appendChild(row);
  });
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'modal') closeModal(); }

async function savePhase() {
  const c = G.selectedContact;
  if (!c) return;
  const phase = document.getElementById('modal-phase').value;
  // Store phase locally (in a real scenario you'd find the right field and PATCH it)
  c._localPhase = phase;
  alert('Phase gespeichert: ' + PHASE_LABELS[phase] + '\n\n(Um die Phase dauerhaft in CRM+ zu speichern, muss das Feld in Ihrem CRM+ konfiguriert werden.)');
  closeModal();
  renderAll();
}

// ── TABS ─────────────────────────────────────────────
function switchTab(tab, el) {
  ['pipeline','wiedervorlage','alle'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});
</script>
